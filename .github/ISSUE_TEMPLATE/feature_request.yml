name: Feature request
description: Suggest an improvement to kdlctl
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem should this solve?
      description: Describe the use case or pain point.
      placeholder: I want to provision...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or UX you would like to see.
      placeholder: Add support for...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Share any workarounds or competing approaches you have tried.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include example KDL, deployment constraints, or links that would help.
